name: shelpet
description: A premium Pet Rescue, Adoption, Fostering, Store & Community application.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  go_router: ^12.0.0
  provider: ^6.0.5
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_spinkit: ^5.2.0
  font_awesome_flutter: 10.1.0
  intl: ^0.18.1
  animate_do: ^3.3.4
  flutter_staggered_animations: ^1.1.1
  flutter_riverpod: ^2.4.3
  image_picker: ^1.0.4
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  share_plus: ^10.0.0
  flutter_local_notifications: ^17.0.0
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
